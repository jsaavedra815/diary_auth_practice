spring:
  application:
    name: diary

  datasource:
    url: jdbc:h2:mem:diarydb
    driver-class-name: org.h2.Driver
    username: admin
    password: admin

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # El User Pool de Cognito contra el que se validan los tokens.
  # Spring descarga solo las llaves públicas de aquí y verifica la firma de cada JWT.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_yzwNALI2A

server:
  port: 8787
